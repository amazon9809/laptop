<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 자동추천</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #21263a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f2f8;
    --text2: #8892b0;
    --text3: #4a5370;
    --r: #e35b4c;
    --b: #4a8fd4;
    --y: #e8b830;
    --g: #3fb87a;
    --p: #9b6de0;
    --gray: #555e78;
    --radius: 12px;
    --radius-sm: 7px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 3rem 1.5rem 2rem;
    border-bottom: 0.5px solid var(--border);
  }
  .logo-row {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--y);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #1a1200;
  }
  header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.5px; }
  header p { font-size: 0.85rem; color: var(--text2); margin-top: 6px; }

  /* ── MAIN LAYOUT ── */
  .container { max-width: 680px; margin: 0 auto; padding: 0 1.25rem; }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding: 1.5rem 0 1rem;
  }
  .ctrl-label { font-size: 0.8rem; color: var(--text2); }
  .qty-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .qty-btn:hover { background: var(--bg2); border-color: rgba(255,255,255,0.25); }
  #qty-display {
    font-size: 1.1rem; font-weight: 600;
    min-width: 28px; text-align: center;
  }

  .mode-toggle {
    display: flex;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
    margin-left: auto;
  }
  .mode-btn {
    padding: 5px 14px;
    border-radius: 16px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.18s;
  }
  .mode-btn.active {
    background: var(--bg2);
    color: var(--text);
    border: 1px solid var(--border2);
  }

  /* ── GENERATE BUTTON ── */
  .gen-wrap { text-align: center; padding: 1rem 0 1.75rem; }
  .btn-generate {
    position: relative;
    padding: 0 2.5rem;
    height: 52px;
    background: var(--y);
    color: #1a1200;
    border: none;
    border-radius: 26px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: transform 0.12s, opacity 0.12s;
  }
  .btn-generate:hover { transform: scale(1.03); }
  .btn-generate:active { transform: scale(0.97); opacity: 0.85; }

  /* ── GAMES GRID ── */
  .games { display: flex; flex-direction: column; gap: 12px; }

  .game-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.2s;
  }
  .game-card:hover { border-color: var(--border2); }

  .game-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.5px;
    min-width: 28px;
  }

  .balls-row {
    display: flex;
    gap: 7px;
    flex: 1;
    flex-wrap: wrap;
  }

  .ball {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    color: #fff;
    opacity: 0;
    transform: scale(0) translateY(10px);
    transition: none;
    user-select: none;
    position: relative;
  }
  .ball.show {
    animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes pop {
    from { opacity: 0; transform: scale(0) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ball colors by range */
  .ball.c1 { background: var(--r); }   /* 1-10 */
  .ball.c2 { background: var(--b); }   /* 11-20 */
  .ball.c3 { background: var(--y); color: #1a1200; } /* 21-30 */
  .ball.c4 { background: var(--g); }   /* 31-40 */
  .ball.c5 { background: var(--p); }   /* 41-45 */

  /* hot/cold badge on ball */
  .ball .badge {
    position: absolute;
    top: -3px; right: -3px;
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid var(--bg2);
    font-size: 0;
  }
  .ball .badge.hot { background: #ff6b35; }
  .ball .badge.cold { background: #70b8ff; }

  .card-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 0.85rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }

  /* ── STATS STRIP ── */
  .stats-strip {
    display: flex;
    gap: 1rem;
    padding: 1.5rem 0 0;
  }
  .stat-pill {
    flex: 1;
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
  }
  .stat-pill .n { font-size: 1.3rem; font-weight: 600; }
  .stat-pill .l { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }

  /* ── HOT / COLD SECTION ── */
  .hc-section { margin-top: 1.75rem; }
  .hc-title {
    font-size: 0.78rem; font-weight: 600; color: var(--text2);
    letter-spacing: 0.4px; margin-bottom: 10px;
  }
  .hc-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .mini-ball {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }

  /* ── COPY TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #fff;
    color: #111;
    padding: 10px 22px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text3);
    font-size: 0.9rem;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty svg { margin-bottom: 12px; opacity: 0.4; }

  /* ── DIVIDER ── */
  .divider {
    height: 0.5px;
    background: var(--border);
    margin: 1.75rem 0;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    font-size: 0.72rem;
    color: var(--text3);
    padding-top: 2rem;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .ball { width: 34px; height: 34px; font-size: 12px; }
    .stats-strip { flex-wrap: wrap; }
    .stat-pill { min-width: calc(50% - 0.5rem); }
    header h1 { font-size: 1.3rem; }
    .btn-generate { height: 46px; font-size: 0.95rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo-icon">L</div>
    <h1>로또 자동추천</h1>
  </div>
  <p>통계 기반 스마트 번호 추천 &middot; 매주 토요일 추첨</p>
</header>

<div class="container">

  <!-- Controls -->
  <div class="controls">
    <span class="ctrl-label">게임 수</span>
    <button class="qty-btn" onclick="changeQty(-1)">&#8722;</button>
    <span id="qty-display">5</span>
    <button class="qty-btn" onclick="changeQty(1)">&#43;</button>

    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('random',this)">완전 랜덤</button>
      <button class="mode-btn" onclick="setMode('hot',this)">핫넘버 우선</button>
      <button class="mode-btn" onclick="setMode('cold',this)">콜드넘버 우선</button>
    </div>
  </div>

  <!-- Generate -->
  <div class="gen-wrap">
    <button class="btn-generate" onclick="generate()">
      &#x2728; &nbsp;번호 추천 받기
    </button>
  </div>

  <!-- Games -->
  <div class="games" id="gamesArea">
    <div class="empty" id="emptyMsg">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <div>버튼을 눌러 번호를 추천 받으세요</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="divider" id="dividerStats" style="display:none"></div>
  <div class="stats-strip" id="statsStrip" style="display:none">
    <div class="stat-pill"><div class="n" id="st-total">0</div><div class="l">총 추천 횟수</div></div>
    <div class="stat-pill"><div class="n" id="st-games">0</div><div class="l">발급 게임 수</div></div>
    <div class="stat-pill"><div class="n" id="st-unique">0</div><div class="l">고유 번호 수</div></div>
    <div class="stat-pill"><div class="n" id="st-top">—</div><div class="l">가장 많이 나온 번호</div></div>
  </div>

  <!-- Hot / Cold -->
  <div class="hc-section" id="hcSection" style="display:none">
    <div class="hc-title">&#128293; 핫넘버 (최근 많이 등장)</div>
    <div class="hc-row" id="hotRow"></div>
    <div style="height:12px"></div>
    <div class="hc-title">&#10052; 콜드넘버 (최근 적게 등장)</div>
    <div class="hc-row" id="coldRow"></div>
  </div>

  <div class="divider"></div>
  <footer>로또 당첨은 운이며, 이 프로그램은 당첨을 보장하지 않습니다. 즐기기 위한 용도로만 사용하세요.</footer>
</div>

<!-- Toast -->
<div class="toast" id="toast">클립보드에 복사되었습니다</div>

<script>
  let qty = 5;
  let mode = 'random';
  let allGenerated = [];
  let totalRuns = 0;
  let totalGames = 0;
  let freq = new Array(46).fill(0);

  /* ── Simulated hot/cold pool (pseudo-historical data) ── */
  const HOT_POOL  = [1,3,6,7,12,14,17,27,34,38,40,43,45];
  const COLD_POOL = [2,8,11,19,22,25,26,29,32,35,37,41,44];

  function ballColor(n) {
    if (n <= 10) return 'c1';
    if (n <= 20) return 'c2';
    if (n <= 30) return 'c3';
    if (n <= 40) return 'c4';
    return 'c5';
  }

  function randPick(pool, count, exclude=[]) {
    const avail = pool.filter(n => !exclude.includes(n));
    const result = [];
    while (result.length < count && avail.length > 0) {
      const i = Math.floor(Math.random() * avail.length);
      result.push(avail.splice(i, 1)[0]);
    }
    return result;
  }

  function genNumbers() {
    const full = Array.from({length: 45}, (_, i) => i + 1);
    let nums = [];

    if (mode === 'random') {
      nums = randPick(full, 6);
    } else if (mode === 'hot') {
      const hotPick = randPick(HOT_POOL, 3);
      const rest = randPick(full, 3, hotPick);
      nums = [...hotPick, ...rest];
    } else {
      const coldPick = randPick(COLD_POOL, 3);
      const rest = randPick(full, 3, coldPick);
      nums = [...coldPick, ...rest];
    }

    return nums.sort((a, b) => a - b);
  }

  function changeQty(delta) {
    qty = Math.max(1, Math.min(10, qty + delta));
    document.getElementById('qty-display').textContent = qty;
  }

  function setMode(m, el) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  function generate() {
    document.getElementById('emptyMsg')?.remove();
    const area = document.getElementById('gamesArea');
    area.innerHTML = '';

    const games = [];
    for (let i = 0; i < qty; i++) {
      games.push(genNumbers());
    }

    games.forEach((nums, idx) => {
      nums.forEach(n => freq[n]++);
      allGenerated.push(...nums);
      renderGame(area, nums, idx);
    });

    totalRuns++;
    totalGames += qty;
    updateStats(games);

    document.getElementById('dividerStats').style.display = '';
    document.getElementById('statsStrip').style.display = 'flex';
    document.getElementById('hcSection').style.display = '';
    renderHotCold();
  }

  function renderGame(area, nums, idx) {
    const card = document.createElement('div');
    card.className = 'game-card';

    const label = document.createElement('span');
    label.className = 'game-label';
    label.textContent = String.fromCharCode(65 + idx);
    card.appendChild(label);

    const row = document.createElement('div');
    row.className = 'balls-row';

    nums.forEach((n, bi) => {
      const ball = document.createElement('div');
      ball.className = 'ball ' + ballColor(n);
      ball.textContent = n;

      const isHot = HOT_POOL.includes(n);
      const isCold = COLD_POOL.includes(n);
      if (isHot || isCold) {
        const badge = document.createElement('span');
        badge.className = 'badge ' + (isHot ? 'hot' : 'cold');
        ball.appendChild(badge);
      }

      setTimeout(() => ball.classList.add('show'), bi * 80 + idx * 40);
      row.appendChild(ball);
    });

    card.appendChild(row);

    /* actions */
    const actions = document.createElement('div');
    actions.className = 'card-actions';

    /* copy */
    const copyBtn = document.createElement('button');
    copyBtn.className = 'icon-btn';
    copyBtn.title = '복사';
    copyBtn.innerHTML = '&#x2398;';
    copyBtn.onclick = () => copyGame(nums);
    actions.appendChild(copyBtn);

    /* refresh single */
    const refreshBtn = document.createElement('button');
    refreshBtn.className = 'icon-btn';
    refreshBtn.title = '다시 추첨';
    refreshBtn.innerHTML = '&#x21BB;';
    refreshBtn.onclick = () => refreshSingle(card, nums, idx);
    actions.appendChild(refreshBtn);

    card.appendChild(actions);
    area.appendChild(card);
  }

  function refreshSingle(card, oldNums, idx) {
    const newNums = genNumbers();
    oldNums.forEach(n => freq[n] = Math.max(0, freq[n] - 1));
    newNums.forEach(n => freq[n]++);

    const row = card.querySelector('.balls-row');
    row.innerHTML = '';

    newNums.forEach((n, bi) => {
      const ball = document.createElement('div');
      ball.className = 'ball ' + ballColor(n);
      ball.textContent = n;
      if (HOT_POOL.includes(n)) {
        const b = document.createElement('span'); b.className = 'badge hot'; ball.appendChild(b);
      } else if (COLD_POOL.includes(n)) {
        const b = document.createElement('span'); b.className = 'badge cold'; ball.appendChild(b);
      }
      setTimeout(() => ball.classList.add('show'), bi * 70);
      row.appendChild(ball);
    });

    updateStats();
    renderHotCold();
  }

  function copyGame(nums) {
    const text = nums.join(', ');
    navigator.clipboard.writeText(text).then(() => showToast('번호 복사 완료: ' + text));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function updateStats(games) {
    document.getElementById('st-total').textContent = totalRuns;
    document.getElementById('st-games').textContent = totalGames;

    const unique = freq.filter(v => v > 0).length;
    document.getElementById('st-unique').textContent = unique;

    let maxF = 0, maxN = '—';
    freq.forEach((v, i) => { if (i > 0 && v > maxF) { maxF = v; maxN = i; } });
    document.getElementById('st-top').textContent = maxN === '—' ? '—' : maxN + '번 (' + maxF + ')';
  }

  function renderHotCold() {
    const indexed = freq.map((v, i) => ({n: i, v})).filter(x => x.n > 0).sort((a, b) => b.v - a.v);
    const hot = indexed.slice(0, 10);
    const cold = indexed.slice(-10).reverse();

    function makeMini(n, cls) {
      const d = document.createElement('div');
      d.className = 'mini-ball ' + cls;
      d.textContent = n;
      return d;
    }

    const hr = document.getElementById('hotRow');
    hr.innerHTML = '';
    hot.forEach(({n}) => hr.appendChild(makeMini(n, 'ball ' + ballColor(n))));

    const cr = document.getElementById('coldRow');
    cr.innerHTML = '';
    cold.forEach(({n}) => cr.appendChild(makeMini(n, 'ball ' + ballColor(n))));
  }
</script>
</body>
</html>
