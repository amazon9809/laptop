
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .app { background: #0d0a1a; color: #e8d5b7; font-family: 'Crimson Text', Georgia, serif; padding: 1.5rem 1rem 3rem; position: relative; overflow: hidden; }
  .stars-bg { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .star { position:absolute; background:#fff; border-radius:50%; animation: twinkle 3s infinite alternate; }
  @keyframes twinkle { 0%{opacity:0.15} 100%{opacity:0.85} }
  .content { position:relative; z-index:1; max-width:700px; margin:0 auto; }
  .title { font-family:'Cinzel Decorative',serif; font-size:clamp(1.3rem,4vw,1.9rem); color:#f0c060; text-align:center; letter-spacing:0.08em; text-shadow:0 0 30px rgba(240,192,96,0.35); margin-bottom:0.3rem; }
  .subtitle { text-align:center; font-style:italic; color:#a89070; font-size:1rem; margin-bottom:1.5rem; }
  .divider { display:flex; align-items:center; gap:0.8rem; margin:1.2rem 0; }
  .divider-line { flex:1; height:0.5px; background:#3a2d1a; }
  .divider-sym { color:#f0c060; font-size:0.9rem; }
  .q-box { background:rgba(255,255,255,0.03); border:0.5px solid rgba(240,192,96,0.25); border-radius:14px; padding:1.25rem; margin-bottom:1.25rem; }
  .q-label { font-family:'Cinzel Decorative',serif; font-size:0.65rem; color:#f0c060; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:0.6rem; display:block; }
  .q-input { width:100%; background:rgba(255,255,255,0.05); border:0.5px solid rgba(240,192,96,0.3); border-radius:8px; padding:0.8rem; color:#e8d5b7; font-family:'Crimson Text',serif; font-size:1.05rem; resize:none; outline:none; transition:border-color 0.3s; }
  .q-input::placeholder { color:#4a3828; }
  .q-input:focus { border-color:rgba(240,192,96,0.6); }
  .draw-btn { display:block; width:100%; margin-top:0.8rem; padding:0.8rem; background:linear-gradient(135deg,#3d2a0a,#6b4015); border:1px solid #f0c060; border-radius:8px; color:#f0c060; font-family:'Cinzel Decorative',serif; font-size:0.8rem; letter-spacing:0.1em; cursor:pointer; transition:all 0.3s; }
  .draw-btn:hover:not(:disabled) { background:linear-gradient(135deg,#4d3510,#8b5520); box-shadow:0 0 20px rgba(240,192,96,0.25); }
  .draw-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .cards-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.75rem; margin-bottom:1.25rem; }
  .card-col { display:flex; flex-direction:column; align-items:center; }
  .card-slot { width:100%; aspect-ratio:0.6; position:relative; }
  .card-back { width:100%; height:100%; border-radius:10px; background:#1a1025; border:1px solid rgba(240,192,96,0.18); display:flex; align-items:center; justify-content:center; }
  .card-back-inner { width:82%; height:82%; border:1px solid rgba(240,192,96,0.12); border-radius:6px; display:flex; align-items:center; justify-content:center; color:rgba(240,192,96,0.18); font-size:1.8rem; }
  .card-face { width:100%; height:100%; border-radius:10px; background:#1a1025; border:1.5px solid rgba(240,192,96,0.45); display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:0.5rem 0.4rem; box-shadow:0 0 18px rgba(240,192,96,0.12); animation:cardReveal 0.5s ease-out; }
  @keyframes cardReveal { from{opacity:0;transform:rotateY(90deg) scale(0.8)} to{opacity:1;transform:rotateY(0) scale(1)} }
  .c-pos { font-family:'Cinzel Decorative',serif; font-size:0.45rem; color:#a07840; letter-spacing:0.08em; text-transform:uppercase; text-align:center; }
  .c-sym { font-size:1.8rem; filter:drop-shadow(0 0 6px rgba(240,192,96,0.4)); }
  .c-name { font-family:'Crimson Text',serif; font-size:0.58rem; color:#e8c888; text-align:center; font-weight:600; line-height:1.2; }
  .c-orient { font-size:0.44rem; color:#907050; font-style:italic; }
  .c-rev .c-sym { transform:rotate(180deg); display:inline-block; filter:drop-shadow(0 0 6px rgba(240,192,96,0.2)); opacity:0.75; }
  .pos-label { font-size:0.78rem; color:#7a6048; font-style:italic; margin-top:0.35rem; }
  .interp-box { background:rgba(255,255,255,0.03); border:0.5px solid rgba(240,192,96,0.2); border-radius:14px; padding:1.25rem; min-height:80px; }
  .interp-head { font-family:'Cinzel Decorative',serif; font-size:0.65rem; color:#f0c060; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:0.9rem; }
  .interp-text { font-size:1.02rem; line-height:1.85; color:#d4b896; white-space:pre-wrap; }
  .loading-wrap { display:flex; align-items:center; gap:10px; padding:0.5rem 0; }
  .dot { width:6px; height:6px; background:#f0c060; border-radius:50%; animation:pd 1.2s ease-in-out infinite; }
  .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
  @keyframes pd { 0%,80%,100%{transform:scale(0.4);opacity:0.3} 40%{transform:scale(1);opacity:1} }
  .err { color:#c06060; font-style:italic; font-size:0.95rem; }
  .empty { text-align:center; color:#4a3828; font-style:italic; font-size:0.95rem; padding:0.75rem 0; }
  .reset-btn { display:block; width:100%; margin-top:0.9rem; padding:0.55rem; background:transparent; border:0.5px solid rgba(240,192,96,0.22); border-radius:7px; color:#a07840; font-family:'Crimson Text',serif; font-size:0.9rem; cursor:pointer; transition:all 0.3s; font-style:italic; }
  .reset-btn:hover { border-color:rgba(240,192,96,0.5); color:#d4a860; }
  .debug-box { margin-top:0.75rem; background:rgba(255,0,0,0.08); border:0.5px solid rgba(255,100,100,0.3); border-radius:8px; padding:0.75rem; font-size:0.8rem; color:#c08080; font-family:monospace; display:none; white-space:pre-wrap; word-break:break-all; }
</style>

<div class="app">
  <div class="stars-bg" id="starsC"></div>
  <div class="content">
    <div class="title">✦ 타로 마스터 ✦</div>
    <div class="subtitle">별과 운명의 신탁</div>
    <div class="divider"><div class="divider-line"></div><div class="divider-sym">✧ ⋆ ✧</div><div class="divider-line"></div></div>

    <div class="q-box">
      <span class="q-label">✦ 당신의 고민을 전하세요</span>
      <textarea class="q-input" id="qInput" rows="3" placeholder="마음 속 깊이 품어온 고민이나 질문을 적어주세요..."></textarea>
      <button class="draw-btn" id="drawBtn" onclick="drawCards()">✦ 카드를 뽑다 ✦</button>
    </div>

    <div class="cards-grid" id="cardsGrid">
      <div class="card-col"><div class="card-slot"><div class="card-back"><div class="card-back-inner">✦</div></div></div><div class="pos-label">과거</div></div>
      <div class="card-col"><div class="card-slot"><div class="card-back"><div class="card-back-inner">✦</div></div></div><div class="pos-label">현재</div></div>
      <div class="card-col"><div class="card-slot"><div class="card-back"><div class="card-back-inner">✦</div></div></div><div class="pos-label">미래</div></div>
    </div>

    <div class="divider"><div class="divider-line"></div><div class="divider-sym">⋆ ✦ ⋆</div><div class="divider-line"></div></div>

    <div class="interp-box">
      <div class="interp-head">🔮 타로 마스터의 해석</div>
      <div id="interpContent"><div class="empty">카드를 뽑으면 마스터의 해석이 이곳에 펼쳐집니다...</div></div>
    </div>

    <div class="debug-box" id="debugBox"></div>
    <button class="reset-btn" id="resetBtn" style="display:none" onclick="resetAll()">↺ 새로운 리딩 시작하기</button>
  </div>
</div>

<script>
const CARDS = [
  {n:"바보",s:"🌟",u:"새 출발, 순수, 모험",r:"무모함, 경솔함"},
  {n:"마법사",s:"✨",u:"의지력, 창조, 집중",r:"조작, 재능 낭비"},
  {n:"여사제",s:"🌙",u:"직관, 내면의 지혜, 신비",r:"억압된 감정, 비밀"},
  {n:"여황제",s:"🌸",u:"풍요, 모성애, 창의성",r:"의존, 창의성 차단"},
  {n:"황제",s:"👑",u:"권위, 안정, 구조",r:"독재, 경직성"},
  {n:"교황",s:"⛪",u:"전통, 신념, 정신적 지도",r:"반항, 관습 거부"},
  {n:"연인",s:"💕",u:"사랑, 조화, 선택",r:"불균형, 잘못된 선택"},
  {n:"전차",s:"🏆",u:"의지, 승리, 결단력",r:"통제 상실, 무방향"},
  {n:"힘",s:"🦁",u:"용기, 인내, 내면의 힘",r:"자기 의심, 나약함"},
  {n:"은둔자",s:"🔦",u:"내면 탐구, 고독, 지혜",r:"고립, 외로움"},
  {n:"운명의 바퀴",s:"🎡",u:"행운, 변화, 순환",r:"불운, 통제 상실"},
  {n:"정의",s:"⚖️",u:"공정, 진실, 인과응보",r:"불공정, 책임 회피"},
  {n:"매달린 자",s:"🔄",u:"희생, 새 시각, 기다림",r:"지연, 저항"},
  {n:"죽음",s:"🦋",u:"변환, 끝과 새 시작",r:"변화 저항, 정체"},
  {n:"절제",s:"🌊",u:"균형, 인내, 조화",r:"불균형, 과잉"},
  {n:"악마",s:"🔗",u:"속박, 물질주의, 그림자",r:"해방, 자유"},
  {n:"탑",s:"⚡",u:"갑작스런 변화, 계시",r:"재앙 회피, 재건"},
  {n:"별",s:"⭐",u:"희망, 영감, 평온",r:"절망, 믿음 상실"},
  {n:"달",s:"🌕",u:"환상, 두려움, 잠재의식",r:"혼란 극복, 명확성"},
  {n:"태양",s:"☀️",u:"기쁨, 성공, 활력",r:"지연된 성공"},
  {n:"심판",s:"🎺",u:"각성, 재생, 용서",r:"자기 의심"},
  {n:"세계",s:"🌍",u:"완성, 통합, 성취",r:"미완성"},
  {n:"완드 에이스",s:"🔥",u:"창조적 열정, 영감",r:"지연, 재능 낭비"},
  {n:"완드 3",s:"🔥",u:"전진, 확장, 탐험",r:"지연, 좌절"},
  {n:"완드 6",s:"🔥",u:"승리, 성공, 인정",r:"자기 의심"},
  {n:"완드 킹",s:"🔥",u:"리더십, 비전, 열정",r:"독재, 충동"},
  {n:"컵 에이스",s:"💧",u:"새 감정, 직관, 사랑의 시작",r:"막힌 감정"},
  {n:"컵 2",s:"💧",u:"파트너십, 사랑, 유대",r:"분리, 불균형"},
  {n:"컵 6",s:"💧",u:"향수, 과거 기억, 순수함",r:"과거 집착"},
  {n:"컵 9",s:"💧",u:"만족, 소원 성취, 행복",r:"불만족"},
  {n:"컵 10",s:"💧",u:"행복한 가정, 조화, 꿈 실현",r:"불화"},
  {n:"컵 퀸",s:"💧",u:"공감, 돌봄, 감성",r:"감정적 의존"},
  {n:"검 에이스",s:"⚔️",u:"진실, 명확성, 돌파구",r:"혼란, 파괴"},
  {n:"검 3",s:"⚔️",u:"슬픔, 심장 고통, 이별",r:"회복, 용서"},
  {n:"검 8",s:"⚔️",u:"제약, 두려움, 자기 한계",r:"자유, 제한 해제"},
  {n:"검 킹",s:"⚔️",u:"지적 권위, 진실, 판단력",r:"잔인한 판단"},
  {n:"펜타클 에이스",s:"🪙",u:"기회, 번영, 안전",r:"기회 놓침"},
  {n:"펜타클 3",s:"🪙",u:"협력, 팀워크, 기술",r:"노력 부족"},
  {n:"펜타클 7",s:"🪙",u:"인내, 장기 투자, 평가",r:"조급, 방향 재고"},
  {n:"펜타클 킹",s:"🪙",u:"물질적 성공, 리더십",r:"부패, 물질주의"},
];

const POS = ["과거","현재","미래"];
const POS_D = ["이 고민이 시작된 뿌리와 과거의 흐름","지금 이 순간 주변에 흐르는 에너지","앞으로 펼쳐질 가능성과 방향"];

let busy = false;

(function createStars(){
  const c = document.getElementById('starsC');
  for(let i=0;i<55;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;`;
    c.appendChild(s);
  }
})();

function pickThree(){
  const shuffled=[...CARDS].sort(()=>Math.random()-0.5);
  return shuffled.slice(0,3).map(c=>({...c,rev:Math.random()<0.35}));
}

function renderCards(cards){
  const g=document.getElementById('cardsGrid');
  g.innerHTML='';
  cards.forEach((c,i)=>{
    const kw=c.rev?c.r:c.u;
    const col=document.createElement('div');
    col.className='card-col';
    col.innerHTML=`
      <div class="card-slot">
        <div class="card-face${c.rev?' c-rev':''}">
          <div class="c-pos">✦ ${POS[i]} ✦</div>
          <div class="c-sym">${c.s}</div>
          <div style="text-align:center">
            <div class="c-name">${c.n}</div>
            <div class="c-orient">${c.rev?'▽ 역방향':'△ 정방향'}</div>
          </div>
        </div>
      </div>
      <div class="pos-label">${POS[i]}</div>`;
    g.appendChild(col);
  });
}

function showDebug(msg){
  const d=document.getElementById('debugBox');
  d.style.display='block';
  d.textContent='[디버그] '+msg;
}

async function drawCards(){
  const q=document.getElementById('qInput').value.trim();
  if(!q){ document.getElementById('qInput').focus(); return; }
  if(busy) return;
  busy=true;

  const btn=document.getElementById('drawBtn');
  btn.disabled=true;
  btn.textContent='✦ 카드를 펼치는 중... ✦';
  document.getElementById('debugBox').style.display='none';

  const cards=pickThree();
  renderCards(cards);

  const ic=document.getElementById('interpContent');
  ic.innerHTML='<div class="loading-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div class="interp-text" style="color:#5a4030;font-style:italic;margin-top:0.4rem">마스터가 카드의 에너지를 읽고 있습니다...</div>';

  const cardDesc=cards.map((c,i)=>`[${POS[i]}] "${c.n}" (${c.rev?'역방향':'정방향'}) — ${c.rev?c.r:c.u} — ${POS_D[i]}`).join('\n');

  const userPrompt=`당신은 수십 년의 경험을 가진 신비롭고 따뜻한 타로 마스터입니다. 사용자의 고민에 대해 뽑힌 3장의 카드를 해석해주세요.

사용자 고민: "${q}"

뽑힌 카드:
${cardDesc}

아래 형식으로 따뜻하고 통찰력 있는 한국어 해석을 써주세요:

🌙 [과거 카드명] — 과거의 흐름
2-3문장 해석

⭐ [현재 카드명] — 현재의 에너지
2-3문장 해석

🌟 [미래 카드명] — 앞으로의 방향
2-3문장 해석

✨ 마스터의 종합 조언
세 카드를 통합한 따뜻한 메시지 3-4문장

문체는 신비롭고 따뜻하게, "당신"으로 호칭해주세요.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: userPrompt }]
      })
    });

    if (!res.ok) {
      const errText = await res.text();
      showDebug(`HTTP ${res.status}: ${errText.slice(0,300)}`);
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();

    if (data.error) {
      showDebug(`API Error: ${JSON.stringify(data.error)}`);
      throw new Error(data.error.message || 'API error');
    }

    const text = (data.content || []).map(b => b.text || "").join("");
    if (!text) { showDebug('응답 content가 비어있음: '+JSON.stringify(data)); throw new Error('empty response'); }

    ic.innerHTML='<div class="interp-text" id="streamEl"></div>';
    const el=document.getElementById('streamEl');
    let i=0, out='';
    const iv=setInterval(()=>{
      if(i<text.length){ out+=text[i]; el.textContent=out; i+=3; }
      else { clearInterval(iv); el.textContent=text; document.getElementById('resetBtn').style.display='block'; }
    },15);

  } catch(err) {
    ic.innerHTML=`<div class="err">⚠️ 신탁의 목소리가 닿지 않았습니다.<br><small style="font-size:0.8rem;color:#8a5050">${err.message}</small></div>`;
    showDebug(err.toString());
    document.getElementById('resetBtn').style.display='block';
  }

  busy=false;
  btn.disabled=false;
  btn.textContent='✦ 카드를 뽑다 ✦';
}

function resetAll(){
  document.getElementById('qInput').value='';
  document.getElementById('interpContent').innerHTML='<div class="empty">카드를 뽑으면 마스터의 해석이 이곳에 펼쳐집니다...</div>';
  document.getElementById('resetBtn').style.display='none';
  document.getElementById('debugBox').style.display='none';
  const g=document.getElementById('cardsGrid');
  g.innerHTML='';
  POS.forEach(p=>{
    const col=document.createElement('div');
    col.className='card-col';
    col.innerHTML=`<div class="card-slot"><div class="card-back"><div class="card-back-inner">✦</div></div></div><div class="pos-label">${p}</div>`;
    g.appendChild(col);
  });
}
</script>
