<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>프리미엄 노트북 상세페이지</title>
    <style>
        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.3s; position: relative; }
        .drop-zone.dragover { border-color: #3b82f6; background: #eff6ff; }
        .img-preview { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .file-input { display: none; }
        [contenteditable]:focus { outline: 2px solid #fb923c; border-radius: 4px; padding: 2px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-relaxed">

    <div class="max-w-3xl mx-auto bg-white shadow-xl my-8 p-6 md:p-12">
        
        <div class="mb-10 p-4 border-2 border-dashed border-gray-200 rounded-lg text-center">
            <p class="text-xs text-gray-400 mb-2">상단</p>
            <div class="h-20 bg-gray-50 flex items-center justify-center text-gray-400">
                <ins class="kakao_ad_area" style="display:none;"
                        data-ad-unit = "DAN-hUg8GNkLeKFHQOE1"
                        data-ad-width = "320"
                        data-ad-height = "50"></ins>
            <script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script></div>
        </div>

        <header class="text-center mb-12">
            <h1 id="title" contenteditable="true" class="text-4xl font-extrabold text-gray-900 mb-4">비교할수록 완벽한 선택, 프리미엄 노트북</h1>
            <p id="subtitle" contenteditable="true" class="text-xl text-gray-600">당신의 생산성을 한 단계 높여줄 최고의 파트너</p>
        </header>

        <div class="mb-12">
            <div id="main-drop-zone" class="drop-zone bg-gray-100 h-80 rounded-2xl flex flex-col items-center justify-center cursor-pointer overflow-hidden" 
                 onclick="document.getElementById('main-file-input').click()"
                 ondragover="event.preventDefault(); this.classList.add('dragover')" 
                 ondragleave="this.classList.remove('dragover')" 
                 ondrop="handleMainDrop(event)">
                <span class="text-gray-400">대표 상품 이미지를 클릭하거나 드래그하세요</span>
                <input type="file" id="main-file-input" class="file-input" accept="image/*" onchange="handleMainFile(event)">
            </div>
        </div>

        <section class="mb-16">
            <h2 class="text-2xl font-bold mb-8 border-l-4 border-orange-500 pl-4">이 제품을 선택해야 하는 이유</h2>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="p-6 bg-gray-50 rounded-xl">
                    <h3 contenteditable="true" class="font-bold text-lg mb-2">🚀 압도적인 퍼포먼스</h3>
                    <p contenteditable="true" class="text-sm text-gray-600">최신 프로세서 탑재로 무거운 작업도 부드럽게 처리합니다.</p>
                </div>
                <div class="p-6 bg-gray-50 rounded-xl">
                    <h3 contenteditable="true" class="font-bold text-lg mb-2">🔋 하루 종일 가는 배터리</h3>
                    <p contenteditable="true" class="text-sm text-gray-600">한 번 충전으로 업무 시간 내내 여유롭게 사용하세요.</p>
                    <p "이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다."</p>

                </div>
            </div>
        </section>

        <section class="mb-16">
            <h2 class="text-2xl font-bold mb-6 border-l-4 border-orange-500 pl-4">상세 사양</h2>
            <table class="w-full text-left text-sm">
                <tr class="border-b"><th class="py-4 text-gray-500">프로세서</th><td contenteditable="true" class="py-4">최신형 고성능 칩셋</td></tr>
                <tr class="border-b"><th class="py-4 text-gray-500">메모리</th><td contenteditable="true" class="py-4">16GB RAM</td></tr>
                <tr class="border-b"><th class="py-4 text-gray-500">디스플레이</th><td contenteditable="true" class="py-4">고해상도 Retina 디스플레이</td></tr>
            </table>
        </section>

        <div class="text-center">
            <a href="https://link.coupang.com/a/eNh7Tjslrw" class="inline-block px-12 py-5 bg-orange-600 text-white font-bold text-2xl rounded-full shadow-lg hover:bg-orange-700 transition transform hover:scale-105">
                지금 바로 구매하고 혜택받기
            </a>
        </div>

        <div class="mt-16 p-4 border-2 border-dashed border-gray-200 rounded-lg text-center">
            <p class="text-xs text-gray-400 mb-2">하단 광고 영역</p>
            <div class="h-20 bg-gray-50 flex items-center justify-center text-gray-400">
                <ins class="kakao_ad_area" style="display:none;"
                     data-ad-unit = "DAN-n7FG9S9Ns4MwP5Ku"
                     data-ad-width = "300"
                     data-ad-height = "250"></ins>
            <script type="text/javascript" src="//t1.kakaocdn.net/kas/static/ba.min.js" async></script></div>
        </div>
    </div>

    <script>
        // 수정된 내용 자동 저장
        document.body.addEventListener('input', () => {
            const editableElements = document.querySelectorAll('[contenteditable="true"]');
            const data = {};
            editableElements.forEach(el => {
                data[el.id || el.innerText.substring(0, 10)] = el.innerHTML;
            });
            localStorage.setItem('pageContent', JSON.stringify(data));
        });

        // 페이지 로드 시 저장된 내용 불러오기
        window.onload = () => {
            const savedImage = localStorage.getItem('productImage');
            if (savedImage) {
                const dropZone = document.getElementById('main-drop-zone');
                dropZone.innerHTML = `<img src="${savedImage}" class="img-preview">`;
            }

            const savedContent = JSON.parse(localStorage.getItem('pageContent'));
            if (savedContent) {
                const editableElements = document.querySelectorAll('[contenteditable="true"]');
                editableElements.forEach(el => {
                    const key = el.id || el.innerText.substring(0, 10);
                    if (savedContent[key]) el.innerHTML = savedContent[key];
                });
            }
        };

        function handleMainDrop(e) {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            processMainFile(file);
        }

        function handleMainFile(e) {
            processMainFile(e.target.files[0]);
        }

        function processMainFile(file) {
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const imageData = event.target.result;
                    const dropZone = document.getElementById('main-drop-zone');
                    dropZone.innerHTML = `<img src="${imageData}" class="img-preview">`;
                    localStorage.setItem('productImage', imageData);
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
