<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>인기 노트북 10선 비교 앨범</title>
    <style>
        .drop-zone { border: 2px dashed #cbd5e1; transition: all 0.3s; }
        .drop-zone.dragover { border-color: #3b82f6; background: #eff6ff; }
        .img-preview { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-4">

    <div class="max-w-4xl mx-auto">
        <!-- 상단 광고 영역 -->
        <div class="my-6 p-4 border-2 border-dashed border-gray-300 rounded-xl bg-white text-center">
            <p class="text-xs text-gray-400 mb-2">상단 광고 영역</p>
            <div class="h-20 bg-gray-50 flex items-center justify-center text-gray-400">[광고 코드 삽입 위치]</div>
        </div>

        <h1 class="text-3xl font-bold text-center mb-8">한눈에 보는 인기 노트북 10선</h1>
        
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
            <script>
                // 여기에 각 제품의 고유 링크를 배열로 관리하세요
                const productLinks = [
                    "https://link1.com", "https://link2.com", "https://link3.com", "https://link4.com", "https://link5.com",
                    "https://link6.com", "https://link7.com", "https://link8.com", "https://link9.com", "https://link10.com"
                ];

                for(let i=1; i<=10; i++) {
                    document.write(`
                        <div class="bg-white p-3 rounded-xl shadow-sm hover:shadow-md transition">
                            <div class="drop-zone bg-gray-200 h-24 mb-3 rounded-lg flex items-center justify-center text-xs text-gray-400 overflow-hidden cursor-pointer" 
                                 ondragover="event.preventDefault(); this.classList.add('dragover')" 
                                 ondragleave="this.classList.remove('dragover')" 
                                 ondrop="handleDrop(event)">
                                <span class="pointer-events-none">이미지 드래그</span>
                            </div>
                            <h3 class="font-bold text-sm mb-1 truncate">프리미엄 노트북 ${i}</h3>
                            <p class="text-orange-600 font-bold text-sm mb-2">1,290,000원</p>
                            <a href="${productLinks[i-1]}" target="_blank" class="block w-full py-2 bg-blue-500 text-white text-center text-xs rounded hover:bg-blue-600 transition">상세보기</a>
                        </div>
                    `);
                }

                function handleDrop(e) {
                    e.preventDefault();
                    e.target.classList.remove('dragover');
                    const file = e.dataTransfer.files[0];
                    if (file && file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            e.target.innerHTML = `<img src="${event.target.result}" class="img-preview">`;
                        };
                        reader.readAsDataURL(file);
                    }
                }
            </script>
        </div>

        <div class="mt-12 p-8 bg-white rounded-2xl shadow-lg text-center">
            <h2 class="text-2xl font-bold mb-4">어떤 노트북을 선택할지 고민되시나요?</h2>
            <p class="text-gray-600 mb-6">사용 목적에 딱 맞는 제품을 전문가가 추천해 드립니다.</p>
            <a href="#" class="inline-block px-8 py-4 bg-orange-500 text-white font-bold text-lg rounded-full shadow hover:bg-orange-600 transition">
                전체 모델 비교하고 구매하기
            </a>
        </div>

        <div class="my-10 p-4 border-2 border-dashed border-gray-300 rounded-xl bg-white text-center">
            <p class="text-xs text-gray-400 mb-2">하단 광고 영역</p>
            <div class="h-20 bg-gray-50 flex items-center justify-center text-gray-400">[광고 코드 삽입 위치]</div>
        </div>
    </div>

</body>
</html>
