const POSITIONS = ["과거", "현재", "미래"];
const POSITION_DESC = [
  "당신의 고민이 시작된 뿌리와 과거의 흐름",
  "지금 이 순간 당신 주변에 흐르는 에너지",
  "앞으로 펼쳐질 가능성과 나아갈 방향"
];

let isLoading = false;
let drawnCards = [];

function createStars() {
  const container = document.getElementById('starsContainer');
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2 + 1;
    star.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      animation-delay: ${Math.random() * 3}s;
      animation-duration: ${2 + Math.random() * 3}s;
    `;
    container.appendChild(star);
  }
}

function getAllCards() {
  return [...TAROT_DB.major, ...TAROT_DB.minor];
}

function pickCards() {
  const all = getAllCards();
  const shuffled = [...all].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 3).map(card => ({
    ...card,
    reversed: Math.random() < 0.35
  }));
}

function renderCards(cards) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  cards.forEach((card, i) => {
    const col = document.createElement('div');
    col.className = 'card-col';
    const kw = card.reversed ? card.keywords.rev : card.keywords.up;
    col.innerHTML = `
      <div class="card-slot">
        <div class="card-face ${card.reversed ? 'card-reversed' : ''}">
          <div class="card-position-label">✦ ${POSITIONS[i]} ✦</div>
          <div class="card-symbol">${card.symbol}</div>
          <div>
            <div class="card-name">${card.name}</div>
            <div class="card-orientation">${card.reversed ? '▽ 역방향' : '△ 정방향'}</div>
          </div>
        </div>
      </div>
      <div class="position-label">${POSITIONS[i]}</div>
    `;
    grid.appendChild(col);
    setTimeout(() => {}, i * 300);
  });
}

async function drawCards() {
  const question = document.getElementById('questionInput').value.trim();
  if (!question) {
    document.getElementById('questionInput').focus();
    document.getElementById('questionInput').placeholder = '질문을 먼저 입력해 주세요...';
    return;
  }
  if (isLoading) return;

  isLoading = true;
  const btn = document.getElementById('drawBtn');
  btn.disabled = true;
  btn.textContent = '✦ 카드를 펼치는 중... ✦';

  drawnCards = pickCards();
  renderCards(drawnCards);

  const interpContent = document.getElementById('interpretationContent');
  interpContent.innerHTML = `
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
    <div class="interp-text" style="color:#6a5038; font-style:italic; margin-top:0.5rem;">마스터가 카드의 에너지를 읽고 있습니다...</div>
  `;

  const cardDescriptions = drawnCards.map((c, i) => {
    const kw = c.reversed ? c.keywords.rev : c.keywords.up;
    return `[${POSITIONS[i]}] "${c.name}" (${c.reversed ? '역방향' : '정방향'}) - 키워드: ${kw} - ${POSITION_DESC[i]}`;
  }).join('\n');

  const prompt = `당신은 수십 년의 경험을 가진 신비롭고 따뜻한 타로 마스터입니다. 사용자의 고민에 대해 뽑힌 3장의 카드를 해석해 드리세요.

사용자의 고민: "${question}"

뽑힌 카드:
${cardDescriptions}

다음 형식으로 따뜻하고 통찰력 있는 해석을 한국어로 작성해 주세요:

🌙 [과거 카드 이름] - 과거의 흐름
해당 카드가 이 고민의 뿌리와 과거에 대해 무엇을 말해주는지 2-3문장으로 설명

⭐ [현재 카드 이름] - 현재의 에너지  
지금 이 순간의 상황과 에너지에 대해 2-3문장으로 설명

🌟 [미래 카드 이름] - 앞으로의 방향
미래의 가능성과 조언을 2-3문장으로 설명

✨ 마스터의 종합 조언
세 카드를 통합한 전체적인 메시지와 따뜻한 격려를 3-4문장으로 작성

문체는 신비롭고 따뜻하되, 너무 딱딱하지 않게 일상 언어로 써주세요. "당신"이라고 호칭하세요.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content.map(b => b.text || "").join("");

    let displayText = "";
    interpContent.innerHTML = `<div class="interp-text" id="streamText"></div>`;
    const streamEl = document.getElementById('streamText');

    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        displayText += text[i];
        streamEl.textContent = displayText;
        i += 2;
      } else {
        clearInterval(interval);
        streamEl.textContent = text;
        document.getElementById('resetBtn').style.display = 'block';
      }
    }, 18);

  } catch (err) {
    interpContent.innerHTML = `<div class="error-text">⚠️ 신탁의 목소리가 닿지 않았습니다. 잠시 후 다시 시도해 주세요.</div>`;
    document.getElementById('resetBtn').style.display = 'block';
  }

  isLoading = false;
  btn.disabled = false;
  btn.textContent = '✦ 카드를 뽑다 ✦';
}

function resetReading() {
  document.getElementById('questionInput').value = '';
  document.getElementById('questionInput').placeholder = '마음 속 깊이 품어온 고민이나 질문을 적어주세요...';
  document.getElementById('interpretationContent').innerHTML =
    '<div class="empty-state">카드를 뽑으면 마스터의 해석이 이곳에 펼쳐집니다...</div>';
  document.getElementById('resetBtn').style.display = 'none';

  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  POSITIONS.forEach(pos => {
    const col = document.createElement('div');
    col.className = 'card-col';
    col.innerHTML = `
      <div class="card-slot"><div class="card-back"><div class="card-back-pattern">✦</div></div></div>
      <div class="position-label">${pos}</div>
    `;
    grid.appendChild(col);
  });
}

createStars();
</script>
