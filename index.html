<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타로 카드 리딩</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+KR:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #080614;
    --bg-mid: #110d24;
    --bg-card: #1a1535;
    --gold: #C9A84C;
    --gold-light: #e8cc80;
    --gold-dim: #7a6430;
    --violet: #6B52AE;
    --violet-light: #9b7ee8;
    --rose: #D4627A;
    --cream: #F0E6D3;
    --cream-dim: #baa98a;
    --text-main: #f0e6d3;
    --text-sub: #9b8f7a;
    --card-back: #1a1535;
    --star-color: rgba(201,168,76,0.7);
  }

  html, body {
    width: 100%; min-height: 100vh;
    font-family: 'Inter', sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    overflow-x: hidden;
  }

  /* ── Stars canvas ── */
  #stars-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* ── Layout ── */
  .app {
    position: relative; z-index: 1;
    max-width: 960px; margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeDown 1s ease both;
  }
  .header .eyebrow {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold-dim); margin-bottom: 0.75rem;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201,168,76,0.35);
    line-height: 1.15;
  }
  .header p {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px; color: var(--text-sub);
    margin-top: 0.75rem; letter-spacing: 0.05em;
  }

  /* ── Spread selector ── */
  .spread-selector {
    display: flex; gap: 0.75rem; justify-content: center;
    flex-wrap: wrap; margin-bottom: 2.5rem;
    animation: fadeUp 1s ease 0.2s both;
  }
  .spread-btn {
    padding: 0.5rem 1.25rem;
    border: 1px solid var(--gold-dim);
    border-radius: 2rem; background: transparent;
    color: var(--cream-dim); font-size: 13px;
    cursor: pointer; transition: all 0.25s;
    font-family: 'Noto Serif KR', serif;
    letter-spacing: 0.04em;
  }
  .spread-btn:hover, .spread-btn.active {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold); color: var(--gold);
    box-shadow: 0 0 16px rgba(201,168,76,0.15);
  }

  /* ── Question input ── */
  .question-area {
    text-align: center; margin-bottom: 2rem;
    animation: fadeUp 1s ease 0.3s both;
  }
  .question-area label {
    display: block; font-size: 12px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold-dim);
    margin-bottom: 0.75rem;
  }
  .question-input {
    width: 100%; max-width: 500px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 8px; padding: 0.75rem 1.25rem;
    color: var(--cream); font-size: 15px;
    font-family: 'Noto Serif KR', serif;
    outline: none; transition: border-color 0.25s;
    text-align: center;
  }
  .question-input::placeholder { color: var(--text-sub); }
  .question-input:focus { border-color: var(--gold-dim); }

  /* ── Shuffle button ── */
  .shuffle-wrap {
    text-align: center; margin-bottom: 3rem;
    animation: fadeUp 1s ease 0.4s both;
  }
  .shuffle-btn {
    position: relative;
    padding: 0.85rem 2.5rem;
    background: linear-gradient(135deg, rgba(107,82,174,0.3), rgba(201,168,76,0.15));
    border: 1px solid var(--gold);
    border-radius: 4px; color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.1em;
    transition: all 0.3s;
    overflow: hidden;
  }
  .shuffle-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(107,82,174,0.5), rgba(201,168,76,0.25));
    opacity: 0; transition: opacity 0.3s;
  }
  .shuffle-btn:hover::before { opacity: 1; }
  .shuffle-btn:hover { box-shadow: 0 0 30px rgba(201,168,76,0.25); }
  .shuffle-btn:active { transform: scale(0.98); }

  /* ── Card deck area ── */
  .deck-area {
    position: relative;
    display: flex; justify-content: center;
    margin-bottom: 2.5rem;
    min-height: 120px;
  }
  .deck-visual {
    position: relative; width: 100px; height: 160px;
    cursor: pointer;
  }
  .deck-stack {
    position: absolute; width: 100px; height: 160px;
    background: var(--card-back);
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
  }
  .deck-stack:nth-child(1) { transform: translate(-4px, -4px); opacity: 0.4; }
  .deck-stack:nth-child(2) { transform: translate(-2px, -2px); opacity: 0.6; }
  .deck-stack:nth-child(3) {
    transform: translate(0,0);
    background: var(--bg-card);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .deck-top-pattern {
    width: 60px; height: 100px;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold-dim); font-size: 28px;
  }

  /* ── Cards display ── */
  .cards-stage {
    display: flex;
    gap: 1.25rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 2.5rem;
    min-height: 260px;
  }

  .card-slot {
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
  }
  .card-position-label {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold-dim); opacity: 0;
    transition: opacity 0.5s;
  }
  .card-slot.revealed .card-position-label { opacity: 1; }

  /* ── Card ── */
  .card-wrap {
    width: 110px; height: 190px;
    perspective: 1000px;
    cursor: pointer;
  }
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
  .card-wrap.reversed .card-inner { transform: rotateY(180deg) rotateZ(180deg); }

  .card-face, .card-back-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 10px;
    border: 1px solid var(--gold-dim);
    overflow: hidden;
  }
  .card-back-face {
    background: var(--bg-card);
    display: flex; align-items: center; justify-content: center;
  }
  .back-pattern {
    width: 70px; height: 120px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px; display: flex; align-items: center;
    justify-content: center; color: rgba(201,168,76,0.4);
    font-size: 24px;
  }
  .card-face {
    transform: rotateY(180deg);
    background: var(--bg-card);
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 0.6rem 0.5rem;
  }
  .card-num {
    font-size: 10px; color: var(--gold-dim);
    font-family: 'Playfair Display', serif;
    align-self: flex-start;
  }
  .card-symbol { font-size: 2rem; }
  .card-name-kr {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px; font-weight: 600;
    color: var(--gold); text-align: center;
    line-height: 1.3;
  }
  .card-name-en {
    font-size: 9px; color: var(--text-sub);
    text-align: center; letter-spacing: 0.05em;
  }
  .card-reversed-badge {
    font-size: 9px; color: var(--rose);
    letter-spacing: 1px;
  }

  /* Appear animation for cards */
  .card-wrap {
    opacity: 0; transform: translateY(30px);
    animation: none;
  }
  .card-wrap.appear {
    animation: cardAppear 0.6s ease forwards;
  }

  /* ── Reading panel ── */
  .reading-panel {
    background: rgba(26,21,53,0.7);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px; padding: 2rem;
    backdrop-filter: blur(8px);
    animation: fadeUp 0.6s ease both;
    display: none;
  }
  .reading-panel.visible { display: block; }

  .reading-header {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }
  .reading-card-symbol { font-size: 2.5rem; }
  .reading-card-title h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; color: var(--gold);
  }
  .reading-card-title .sub {
    font-size: 12px; color: var(--text-sub);
    margin-top: 2px;
  }
  .reversed-tag {
    display: inline-block; padding: 2px 10px;
    background: rgba(212,98,122,0.15);
    border: 1px solid rgba(212,98,122,0.4);
    border-radius: 20px; font-size: 11px;
    color: var(--rose); margin-left: 0.5rem;
  }

  .reading-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1rem; margin-bottom: 1.5rem;
  }
  @media (max-width: 600px) { .reading-grid { grid-template-columns: 1fr; } }

  .reading-block {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 8px; padding: 1rem;
  }
  .reading-block h4 {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold-dim); margin-bottom: 0.6rem;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .reading-block .dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--gold-dim);
  }
  .reading-block p {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px; color: var(--cream-dim);
    line-height: 1.75;
  }

  .reading-position-label {
    text-align: center; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--violet-light); margin-bottom: 1rem;
  }

  .ai-interpretation {
    background: rgba(107,82,174,0.08);
    border: 1px solid rgba(107,82,174,0.25);
    border-radius: 8px; padding: 1rem 1.25rem;
    margin-top: 1rem;
  }
  .ai-interpretation h4 {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--violet-light); margin-bottom: 0.6rem;
  }
  .ai-interpretation p {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px; color: var(--cream-dim);
    line-height: 1.8;
  }

  .next-card-hint {
    text-align: center; margin-top: 1rem;
    font-size: 12px; color: var(--text-sub);
    letter-spacing: 1px;
    animation: pulse 2s ease infinite;
  }

  .all-cards-summary {
    background: rgba(26,21,53,0.7);
    border: 1px solid rgba(107,82,174,0.3);
    border-radius: 12px; padding: 2rem;
    margin-top: 1.5rem;
    display: none;
  }
  .all-cards-summary.visible { display: block; animation: fadeUp 0.6s ease both; }
  .all-cards-summary h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; color: var(--violet-light);
    margin-bottom: 1rem; text-align: center;
  }
  .summary-cards {
    display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem;
  }
  .summary-chip {
    padding: 0.3rem 0.8rem;
    background: rgba(107,82,174,0.15);
    border: 1px solid rgba(107,82,174,0.3);
    border-radius: 20px; font-size: 12px;
    color: var(--violet-light);
    font-family: 'Noto Serif KR', serif;
    cursor: pointer; transition: all 0.2s;
  }
  .summary-chip:hover { background: rgba(107,82,174,0.3); }
  .summary-chip.active { background: rgba(107,82,174,0.4); border-color: var(--violet-light); }

  .reset-btn {
    display: block; margin: 2rem auto 0;
    padding: 0.7rem 2rem;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px; color: var(--gold-dim);
    font-family: 'Noto Serif KR', serif;
    font-size: 13px; cursor: pointer;
    transition: all 0.25s; letter-spacing: 0.05em;
  }
  .reset-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes cardAppear {
    from { opacity: 0; transform: translateY(30px) scale(0.9); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  @keyframes shimmer {
    0% { left: -100%; }
    100% { left: 200%; }
  }
  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(-80px) rotate(15deg); opacity: 0; }
  }

  .spread-desc {
    text-align: center; font-size: 12px;
    color: var(--text-sub); margin-bottom: 1.5rem;
    font-family: 'Noto Serif KR', serif;
    letter-spacing: 0.04em;
    animation: fadeUp 1s ease 0.25s both;
  }

  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 2rem auto;
  }
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>

<div class="app">
  <header class="header">
    <div class="eyebrow">✦ 신비로운 타로 ✦</div>
    <h1>타로 카드 리딩</h1>
    <p>카드를 셔플하고 당신의 질문에 답을 구하세요</p>
  </header>

  <div class="spread-selector" id="spreadSelector">
    <button class="spread-btn active" data-spread="1">한 장 뽑기</button>
    <button class="spread-btn" data-spread="3">과거·현재·미래</button>
    <button class="spread-btn" data-spread="5">켈틱 크로스 (5장)</button>
  </div>
  <p class="spread-desc" id="spreadDesc">지금 이 순간의 에너지와 메시지</p>

  <div class="question-area">
    <label>나의 질문</label>
    <input type="text" class="question-input" id="questionInput"
      placeholder="어떤 것이 궁금하신가요? (선택사항)">
  </div>

  <div class="shuffle-wrap">
    <button class="shuffle-btn" id="shuffleBtn">✦ 카드 셔플 &amp; 드로우 ✦</button>
  </div>

  <div class="cards-stage" id="cardsStage"></div>

  <div class="reading-panel" id="readingPanel">
    <div class="reading-position-label" id="readingPositionLabel"></div>
    <div class="reading-header">
      <div class="reading-card-symbol" id="readingSymbol"></div>
      <div class="reading-card-title">
        <h3 id="readingTitle"></h3>
        <div class="sub" id="readingSubtitle"></div>
      </div>
    </div>
    <div class="reading-grid">
      <div class="reading-block">
        <h4><span class="dot"></span> 긍정적 의미</h4>
        <p id="readingPositive"></p>
      </div>
      <div class="reading-block">
        <h4><span class="dot" style="background:var(--rose)"></span> 부정적 의미</h4>
        <p id="readingNegative"></p>
      </div>
    </div>
    <div class="ai-interpretation">
      <h4>✦ 오늘의 메시지</h4>
      <p id="readingMessage"></p>
    </div>
    <p class="next-card-hint" id="nextCardHint"></p>
  </div>

  <div class="all-cards-summary" id="allCardsSummary">
    <h3>전체 리딩 요약</h3>
    <div class="summary-cards" id="summaryCards"></div>
    <div class="ai-interpretation" id="summaryMessage"></div>
    <button class="reset-btn" id="resetBtn">↺ 새로운 리딩 시작</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// TAROT DATA (from PDF)
// ══════════════════════════════════════════
const MAJOR = [
  { id:'M0',  num:'0',  name:'바보',         en:'The Fool',           symbol:'🃏', suit:'major',
    pos:'새로운 도전, 기대감, 모험심. 새로운 일 시작, 이사, 여행.',
    neg:'준비 부족, 무계획적 행동, 진지한 마음 결여. 중요한 결정을 고민 없이 내림.',
    msg:'아무것도 잃을 것이 없는 순수한 시작의 에너지가 당신 곁에 있습니다. 새로운 여정을 두려워하지 마세요.' },
  { id:'M1',  num:'I',  name:'마법사',        en:'The Magician',       symbol:'🎩', suit:'major',
    pos:'다재다능, 문제해결 능력, 창의성, 의지력. 프로젝트 성공, 자신감 있는 태도.',
    neg:'과시, 허세, 타인 조작. 자신의 능력을 과대평가하거나 주변 사람을 속임.',
    msg:'당신은 이미 필요한 모든 도구를 손에 쥐고 있습니다. 지금은 실행할 때입니다.' },
  { id:'M2',  num:'II', name:'여사제',        en:'The High Priestess', symbol:'🌙', suit:'major',
    pos:'직감적 판단, 침착함, 신중한 태도. 중요한 선택에서 올바른 감각 발휘, 비밀 유지.',
    neg:'지나친 신비주의, 소극적 태도. 문제를 직면하지 않고 회피.',
    msg:'내면의 목소리에 귀를 기울이세요. 지금 당신이 느끼는 직감은 거의 틀리지 않습니다.' },
  { id:'M3',  num:'III',name:'여황제',        en:'The Empress',        symbol:'🌿', suit:'major',
    pos:'풍요로움, 모성애, 창조성. 새로운 아이디어 실현, 육아와 가정에서 만족감.',
    neg:'과잉보호, 의존. 독립하지 못하고 다른 사람에게의존, 지나치게 통제적.',
    msg:'풍요와 창조의 에너지가 흐릅니다. 당신이 돌보는 모든 것이 꽃을 피울 준비가 되어 있습니다.' },
  { id:'M4',  num:'IV', name:'황제',          en:'The Emperor',        symbol:'👑', suit:'major',
    pos:'질서, 규율, 안정성. 회사 운영에서 리더십 발휘, 목표를 향한 강한 의지.',
    neg:'권위적 태도, 융통성 부족. 타인의 의견을 무시하거나 강압적인 태도.',
    msg:'지금은 체계와 규율이 필요한 시기입니다. 흔들리지 않는 중심을 세우세요.' },
  { id:'M5',  num:'V',  name:'교황',          en:'The Hierophant',     symbol:'⛪', suit:'major',
    pos:'전통 존중, 교육과 상담의 역할. 전통적인 방식으로 문제 해결, 조언자로서 신뢰 얻음.',
    neg:'고지식함, 편협한 태도. 새로운 방식을 거부하거나 지나치게 보수적인 선택.',
    msg:'검증된 지혜와 전통에서 답을 찾아보세요. 신뢰할 수 있는 멘토의 조언이 도움이 됩니다.' },
  { id:'M6',  num:'VI', name:'연인',          en:'The Lovers',         symbol:'💞', suit:'major',

  {id:'PKg',num:'K',   name:'펜타클 킹',     en:'King of Pentacles',  symbol:'💎', suit:'pents', pos:'안정성, 풍요.', neg:'물질주의.', msg:'재정적 안정과 풍요를 이루었거나 이루게 됩니다. 현명하게 관리하세요.'},
];

const ALL_CARDS = [...MAJOR, ...CUPS, ...WANDS, ...SWORDS, ...PENTACLES];

// ══════════════════════════════════════════
// SPREAD CONFIG
// ══════════════════════════════════════════
const SPREADS = {
  1: { count:1, labels:['현재의 에너지'] },
  3: { count:3, labels:['과거','현재','미래'] },
  5: { count:5, labels:['현재 상황','도전 과제','잠재의식','조언','결과'] },
};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let state = {
  spread: 1,
  drawn: [],
  reversed: [],
  currentRevealIndex: -1,
};

// ══════════════════════════════════════════
// STARS BACKGROUND
// ══════════════════════════════════════════
function initStars() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({length:150}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.003 + 0.001,
      phase: Math.random() * Math.PI * 2,
    }));
  }
  resize();
  window.addEventListener('resize', resize);

  let t = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t += 0.01;
    stars.forEach(s => {
      const a = 0.3 + 0.5 * (0.5 + 0.5 * Math.sin(t * s.speed * 100 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(201,168,76,${a})`;
      ctx.fill();
    });
    requestAnimationFrame(animate);
  }
  animate();
}

// ══════════════════════════════════════════
// CARD DRAWING
// ══════════════════════════════════════════
function shuffleArray(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function drawCards(count) {
  const shuffled = shuffleArray(ALL_CARDS);
  const drawn = shuffled.slice(0, count);
  const reversed = drawn.map(() => Math.random() < 0.3);
  return { drawn, reversed };
}

// ══════════════════════════════════════════
// RENDER CARDS
// ══════════════════════════════════════════
function renderCards() {
  const stage = document.getElementById('cardsStage');
  stage.innerHTML = '';
  const spread = SPREADS[state.spread];

  state.drawn.forEach((card, i) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.id = `slot-${i}`;

    const label = document.createElement('div');
    label.className = 'card-position-label';
    label.textContent = spread.labels[i];
    slot.appendChild(label);

    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.id = `card-${i}`;
    wrap.innerHTML = `
      <div class="card-inner">
        <div class="card-back-face">
          <div class="back-pattern">✦</div>
        </div>
        <div class="card-face">
          <div class="card-num">${card.num}</div>
          <div class="card-symbol">${card.symbol}</div>
          <div class="card-name-kr">${card.name}</div>
          <div class="card-name-en">${card.en}</div>
          ${state.reversed[i] ? '<div class="card-reversed-badge">역방향</div>' : ''}
        </div>
      </div>`;
    wrap.addEventListener('click', () => flipCard(i));
    slot.appendChild(wrap);
    stage.appendChild(slot);

    // Staggered appear animation
    setTimeout(() => {
      wrap.classList.add('appear');
    }, i * 200);
  });
}

function flipCard(index) {
  const wrap = document.getElementById(`card-${index}`);
  if (!wrap || wrap.classList.contains('flipped') || wrap.classList.contains('reversed')) return;

  // Only flip in order
  if (index !== state.currentRevealIndex + 1) return;
  state.currentRevealIndex = index;

  const slot = document.getElementById(`slot-${index}`);
  slot.classList.add('revealed');

  if (state.reversed[index]) {
    wrap.classList.add('reversed');
  } else {
    wrap.classList.add('flipped');
  }

  // Particle burst
  createParticleBurst(wrap);

  setTimeout(() => showReading(index), 600);
}

function createParticleBurst(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  for(let i=0;i<8;i++){
    const p = document.createElement('div');
    p.style.cssText = `position:fixed;left:${cx}px;top:${cy}px;width:6px;height:6px;
      border-radius:50%;background:var(--gold);pointer-events:none;z-index:9999;
      animation:floatUp 0.8s ease forwards;transform-origin:center;`;
    p.style.left = (cx + (Math.random()-0.5)*80) + 'px';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

// ══════════════════════════════════════════
// SHOW READING
// ══════════════════════════════════════════
function showReading(index) {
  const card = state.drawn[index];
  const isRev = state.reversed[index];
  const spread = SPREADS[state.spread];
  const panel = document.getElementById('readingPanel');

  document.getElementById('readingPositionLabel').textContent =
    `✦ ${spread.labels[index]} ✦`;
  document.getElementById('readingSymbol').textContent = card.symbol;
  document.getElementById('readingTitle').innerHTML =
    `${card.name} <span style="font-size:0.9rem;color:var(--text-sub)">${card.en}</span>
    ${isRev ? '<span class="reversed-tag">역방향</span>' : ''}`;
  document.getElementById('readingSubtitle').textContent =
    `${card.suit === 'major' ? '메이저 아르카나' : '마이너 아르카나 · ' + card.num}`;
  document.getElementById('readingPositive').textContent = card.pos;
  document.getElementById('readingNegative').textContent = card.neg;
  document.getElementById('readingMessage').textContent =
    isRev
      ? `⚠️ 역방향: ${card.neg} 이 에너지에 주의하고, 내면의 저항을 살펴보세요.`
      : card.msg;

  const isLast = index === state.drawn.length - 1;
  const hint = document.getElementById('nextCardHint');
  if (!isLast) {
    hint.textContent = '다음 카드를 클릭하여 뒤집어보세요 ↑';
    hint.style.display = 'block';
  } else {
    hint.style.display = 'none';
    setTimeout(showSummary, 800);
  }

  panel.style.display = 'none';
  panel.classList.remove('visible');
  void panel.offsetWidth; // reflow for animation
  panel.style.display = '';
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ══════════════════════════════════════════
// SHOW SUMMARY
// ══════════════════════════════════════════
function showSummary() {
  const summary = document.getElementById('allCardsSummary');
  const chipsEl = document.getElementById('summaryCards');
  const msgEl = document.getElementById('summaryMessage');
  const spread = SPREADS[state.spread];

  chipsEl.innerHTML = '';
  state.drawn.forEach((card, i) => {
    const chip = document.createElement('div');
    chip.className = 'summary-chip';
    chip.textContent = `${card.symbol} ${spread.labels[i]}: ${card.name}${state.reversed[i]?' (역)':''}`;
    chip.addEventListener('click', () => {
      showReading(i);
      document.querySelectorAll('.summary-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    });
    chipsEl.appendChild(chip);
  });

  // Generate overall message
  const positiveCount = state.reversed.filter(r=>!r).length;
  const overallTone = positiveCount >= state.drawn.length * 0.6 ? '전반적으로 긍정적인' : '변화와 도전이 필요한';
  const question = document.getElementById('questionInput').value.trim();
  const qPart = question ? `"${question}"에 대한 답으로, ` : '';

  msgEl.innerHTML = `<h4>✦ 전체 메시지</h4>
    <p>${qPart}당신의 카드는 <strong style="color:var(--gold)">${overallTone}</strong> 에너지를 보여주고 있습니다.<br><br>
    ${state.drawn.map((c,i) => `<strong style="color:var(--cream)">${spread.labels[i]}</strong>에 뽑힌 ${c.name} 카드는 ${state.reversed[i] ? '역방향으로 주의와 성찰이 필요함을' : '순방향으로 긍정적 에너지를'} 나타냅니다.`).join('<br>')}
    <br><br>카드가 전하는 핵심 메시지: <em style="color:var(--gold-light)">${state.drawn[Math.floor(state.drawn.length/2)].msg}</em></p>`;

  summary.classList.add('visible');
  summary.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ══════════════════════════════════════════
// SHUFFLE ACTION
// ══════════════════════════════════════════
function doShuffle() {
  const btn = document.getElementById('shuffleBtn');
  btn.disabled = true;
  btn.textContent = '✦ 셔플 중 ...';
  btn.style.opacity = '0.6';

  // Reset
  state.currentRevealIndex = -1;
  document.getElementById('readingPanel').classList.remove('visible');
  document.getElementById('allCardsSummary').classList.remove('visible');
  document.getElementById('cardsStage').innerHTML = '';

  setTimeout(() => {
    const result = drawCards(SPREADS[state.spread].count);
    state.drawn = result.drawn;
    state.reversed = result.reversed;
    renderCards();
    btn.disabled = false;
    btn.textContent = '✦ 카드 셔플 & 드로우 ✦';
    btn.style.opacity = '1';

    // Auto-hint
    setTimeout(() => {
      const firstCard = document.getElementById('card-0');
      if(firstCard) firstCard.style.boxShadow = '0 0 20px rgba(201,168,76,0.5)';
      setTimeout(() => { if(firstCard) firstCard.style.boxShadow = ''; }, 1000);
    }, 600);
  }, 800);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initStars();

  // Spread selector
  const DESCS = {
    1: '지금 이 순간의 에너지와 메시지',
    3: '과거의 흔적, 현재의 상황, 미래의 가능성',
    5: '켈틱 크로스 스프레드 — 깊이 있는 상황 분석',
  };
  document.querySelectorAll('.spread-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.spread-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.spread = parseInt(btn.dataset.spread);
      document.getElementById('spreadDesc').textContent = DESCS[state.spread];
      document.getElementById('cardsStage').innerHTML = '';
      document.getElementById('readingPanel').classList.remove('visible');
      document.getElementById('allCardsSummary').classList.remove('visible');
    });
  });

  document.getElementById('shuffleBtn').addEventListener('click', doShuffle);
  document.getElementById('resetBtn').addEventListener('click', () => {
    document.getElementById('allCardsSummary').classList.remove('visible');
    document.getElementById('readingPanel').classList.remove('visible');
    document.getElementById('cardsStage').innerHTML = '';
    document.getElementById('questionInput').value = '';
    state.currentRevealIndex = -1;
  });
});
